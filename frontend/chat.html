<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chat · China Travel Agent</title>
    <style>
      :root{
        --bg0:#05070b;
        --bg1:#0a0f17;
        --line:rgba(255,255,255,.08);
        --muted:rgba(255,255,255,.62);
        --text:rgba(255,255,255,.92);
        --chip:rgba(255,255,255,.08);
        --chip2:rgba(255,255,255,.12);
        --accent:#7dd3fc;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC","Hiragino Sans GB","Microsoft YaHei", Arial, sans-serif;
      }
      html,body{height:100%}
      body{
        margin:0;
        background: radial-gradient(1200px 800px at 30% 15%, #121826 0%, var(--bg1) 55%, var(--bg0) 100%);
        color:var(--text);
        overflow:hidden;
      }
      .bg-shanshui{position:fixed; inset:0; background:url("/assets/bg/shanshui.svg") center/cover no-repeat; opacity:.12; filter: blur(6px); pointer-events:none;}
      .bg-cloud{position:fixed; inset:0; background:url("/assets/patterns/cloud.svg") center/420px repeat; opacity:.06; mix-blend-mode: screen; pointer-events:none;}
      header{
        height:52px; display:flex; align-items:center; justify-content:space-between;
        padding:0 14px; border-bottom:1px solid var(--line);
        background:rgba(8,10,14,.55); backdrop-filter: blur(10px);
      }
      header .brand{display:flex; gap:10px; align-items:center; letter-spacing:.2px;}
      header .brand .dot{width:10px;height:10px;border-radius:99px;background:var(--accent); box-shadow:0 0 18px rgba(125,211,252,.45);}
      header .brand .name{font-weight:650; font-size:14px;}
      header .right{display:flex; gap:10px; align-items:center;}
      .badge{font-size:12px; padding:6px 10px; border:1px solid var(--line); border-radius:999px; background:rgba(255,255,255,.04)}
      button.ghost{font-size:12px; padding:7px 10px; border:1px solid var(--line); border-radius:999px; background:rgba(255,255,255,.03); color:var(--text); cursor:pointer;}
      button.ghost:hover{background:rgba(255,255,255,.06)}
      .layout{
        position:relative;
        height:calc(100% - 52px);
        display:grid;
        grid-template-columns: 320px 1fr;
      }
      @media (max-width: 860px){
        .layout{grid-template-columns: 1fr;}
        #sidebar{display:none;}
      }
      #sidebar{
        border-right:1px solid var(--line);
        background:rgba(8,10,14,.35);
        overflow:auto;
      }
      .sideTop{position:sticky; top:0; padding:12px; border-bottom:1px solid var(--line); background:rgba(8,10,14,.55); backdrop-filter: blur(10px);}
      .pill{border:1px solid var(--line); background:rgba(255,255,255,.05); color:var(--text); padding:8px 10px; border-radius:999px; cursor:pointer;}
      .tripItem{padding:12px 12px; border-bottom:1px solid rgba(255,255,255,.06); cursor:pointer;}
      .tripItem:hover{background:rgba(255,255,255,.04)}
      .tripItem.active{background:rgba(125,211,252,.08); border-bottom-color:rgba(125,211,252,.16)}
      .tripTitle{font-size:13px; font-weight:600;}
      .tripMeta{font-size:12px; color:var(--muted); margin-top:4px;}
      main{
        display:flex; flex-direction:column; height:100%;
      }
      #thread{
        flex:1;
        overflow:auto;
        padding:18px 16px 90px;
      }
      .msg{display:flex; margin:10px 0;}
      .msg.user{justify-content:flex-end;}
      .bubble{
        max-width:min(760px, 92%);
        border:1px solid var(--line);
        border-radius:14px;
        padding:10px 12px;
        white-space:pre-wrap;
        line-height:1.35;
        background:rgba(255,255,255,.03);
      }
      .msg.user .bubble{background:rgba(125,211,252,.10); border-color:rgba(125,211,252,.18);}
      footer{
        position:absolute;
        left:0; right:0; bottom:0;
        padding:12px 14px;
        border-top:1px solid var(--line);
        background:rgba(8,10,14,.55);
        backdrop-filter: blur(10px);
      }
      #msgForm{display:flex; gap:10px; align-items:center;}
      #msgInput{
        flex:1; height:44px;
        border-radius:999px;
        border:1px solid var(--line);
        background:rgba(255,255,255,.03);
        color:var(--text);
        padding:0 14px;
        outline:none;
      }
      #msgInput:focus{border-color:rgba(125,211,252,.35); box-shadow:0 0 0 4px rgba(125,211,252,.12)}
      #sendBtn{height:44px; padding:0 14px; border-radius:999px; border:1px solid rgba(125,211,252,.35); background:rgba(125,211,252,.14); color:var(--text); cursor:pointer;}
      #sendBtn:hover{background:rgba(125,211,252,.20)}
    </style>
  </head>
  <body>
    <div class="bg-shanshui"></div>
    <div class="bg-cloud"></div>
    <header>
      <div class="brand">
        <div class="dot"></div>
        <div class="name">China Travel Agent</div>
      </div>
      <div class="right" id="authArea"></div>
    </header>

    <div class="layout">
      <aside id="sidebar"></aside>
      <main>
        <div id="thread"></div>
      </main>
      <footer>
        <form id="msgForm">
          <input id="msgInput" placeholder="开始对话…（回车发送）" />
          <button id="sendBtn" type="submit">Send</button>
        </form>
      </footer>
    </div>

    <script type="module" src="/app.js"></script>
    <script type="module" src="/chat.js"></script>
  </body>
</html>
