<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chat · China Travel Agent</title>
    <style>
      :root{
        --bg0:#05070b;
        --bg1:#0a0f17;
        --line:rgba(255,255,255,.08);
        --muted:rgba(255,255,255,.62);
        --text:rgba(255,255,255,.92);
        --chip:rgba(255,255,255,.08);
        --chip2:rgba(255,255,255,.12);
        --accent:#7dd3fc;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC","Hiragino Sans GB","Microsoft YaHei", Arial, sans-serif;
      }
      html,body{height:100%}
      body{
        margin:0;
        background: radial-gradient(1200px 800px at 30% 15%, #121826 0%, var(--bg1) 55%, var(--bg0) 100%);
        color:var(--text);
        overflow:hidden;
      }
      .bg-shanshui{position:fixed; inset:0; background:url("/assets/bg/shanshui.svg") center/cover no-repeat; opacity:.12; filter: blur(6px); pointer-events:none;}
      .bg-cloud{position:fixed; inset:0; background:url("/assets/patterns/cloud.svg") center/420px repeat; opacity:.06; mix-blend-mode: screen; pointer-events:none;}
      header{
        height:52px; display:flex; align-items:center; justify-content:space-between;
        padding:0 14px; border-bottom:1px solid var(--line);
        background:rgba(8,10,14,.55); backdrop-filter: blur(10px);
      }
      header .brand{display:flex; gap:10px; align-items:center; letter-spacing:.2px;}
      header .brand .dot{width:10px;height:10px;border-radius:99px;background:var(--accent); box-shadow:0 0 18px rgba(125,211,252,.45);}
      header .brand .name{font-weight:650; font-size:14px;}
      header .right{display:flex; gap:10px; align-items:center;}
      .badge{font-size:12px; padding:6px 10px; border:1px solid var(--line); border-radius:999px; background:rgba(255,255,255,.04)}
      button.ghost{font-size:12px; padding:7px 10px; border:1px solid var(--line); border-radius:999px; background:rgba(255,255,255,.03); color:var(--text); cursor:pointer;}
      button.ghost:hover{background:rgba(255,255,255,.06)}
      .layout{
        position:relative;
        height:calc(100% - 52px);
        display:grid;
        grid-template-columns: 320px 1fr 360px;
      }
      @media (max-width: 860px){
        .layout{grid-template-columns: 1fr;}
        #sidebar{display:none;}
        #details{display:none;}
        #btnDetails{display:inline-flex;}
      }
      #sidebar{
        border-right:1px solid var(--line);
        background:rgba(8,10,14,.35);
        overflow:auto;
      }
      #details{
        border-left:1px solid var(--line);
        background:rgba(8,10,14,.35);
        overflow:auto;
      }
      .sideTop{position:sticky; top:0; padding:12px; border-bottom:1px solid var(--line); background:rgba(8,10,14,.55); backdrop-filter: blur(10px);}
      .pill{border:1px solid var(--line); background:rgba(255,255,255,.05); color:var(--text); padding:8px 10px; border-radius:999px; cursor:pointer;}
      .tripItem{padding:12px 12px; border-bottom:1px solid rgba(255,255,255,.06); cursor:pointer;}
      .tripItem:hover{background:rgba(255,255,255,.04)}
      .tripItem.active{background:rgba(125,211,252,.08); border-bottom-color:rgba(125,211,252,.16)}
      .tripTitle{font-size:13px; font-weight:600;}
      .tripMeta{font-size:12px; color:var(--muted); margin-top:4px;}
      main{
        display:flex; flex-direction:column; height:100%;
      }
      #thread{
        flex:1;
        overflow:auto;
        padding:18px 16px 90px;
      }
      .msg{display:flex; margin:10px 0;}
      .msg.user{justify-content:flex-end;}
      .bubble{
        max-width:min(760px, 92%);
        border:1px solid var(--line);
        border-radius:14px;
        padding:10px 12px;
        white-space:pre-wrap;
        line-height:1.35;
        background:rgba(255,255,255,.03);
      }
      .msg.user .bubble{background:rgba(125,211,252,.10); border-color:rgba(125,211,252,.18);}
      footer{
        position:absolute;
        left:0; right:0; bottom:0;
        padding:12px 14px;
        border-top:1px solid var(--line);
        background:rgba(8,10,14,.55);
        backdrop-filter: blur(10px);
      }
      #msgForm{display:flex; gap:10px; align-items:center;}
      #msgInput{
        flex:1; height:44px;
        border-radius:999px;
        border:1px solid var(--line);
        background:rgba(255,255,255,.03);
        color:var(--text);
        padding:0 14px;
        outline:none;
      }
      #msgInput:focus{border-color:rgba(125,211,252,.35); box-shadow:0 0 0 4px rgba(125,211,252,.12)}
      #sendBtn{height:44px; padding:0 14px; border-radius:999px; border:1px solid rgba(125,211,252,.35); background:rgba(125,211,252,.14); color:var(--text); cursor:pointer;}
      #sendBtn:hover{background:rgba(125,211,252,.20)}

      .detailsHead{position:sticky; top:0; padding:14px 12px; border-bottom:1px solid var(--line); background:rgba(8,10,14,.55); backdrop-filter: blur(10px);}
      .detailsTitle{font-size:13px; font-weight:650;}
      .detailsMeta{font-size:12px; color:var(--muted); margin-top:6px; line-height:1.3;}
      .tabs{display:flex; gap:8px; padding:10px 12px; border-bottom:1px solid rgba(255,255,255,.06);}
      .tab{font-size:12px; padding:8px 10px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.03); color:var(--text); cursor:pointer;}
      .tab.active{background:rgba(125,211,252,.12); border-color:rgba(125,211,252,.22);}
      #panel{padding:12px;}
      .kv{display:grid; grid-template-columns: 110px 1fr; gap:6px; font-size:12px; color:var(--muted);}
      .card{border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.03); border-radius:12px; padding:10px; margin-bottom:10px;}
      .card h4{margin:0 0 8px; font-size:12px; color:rgba(255,255,255,.86);}
      .smallBtn{font-size:12px; padding:6px 10px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.03); color:var(--text); cursor:pointer;}
      .smallBtn:hover{background:rgba(255,255,255,.06)}
      .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size:11px; white-space:pre-wrap;}
      .cursor-blink{animation: blink 1s step-end infinite;}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
      .bubble p{margin:0}
      .bubble ul{margin:4px 0;padding-left:18px}
      .bubble code{background:rgba(255,255,255,.08);padding:1px 4px;border-radius:3px;font-size:12px}
      .bubble strong{color:rgba(255,255,255,.95)}
      .bubble a{color:var(--accent)}
    </style>
  </head>
  <body>
    <div class="bg-shanshui"></div>
    <div class="bg-cloud"></div>
    <header>
      <div class="brand">
        <div class="dot"></div>
        <div class="name" data-i18n="app.title">China Travel Agent</div>
      </div>
      <div class="right">
        <div id="langSwitcherArea"></div>
        <button class="ghost" id="btnDetails" style="display:none" data-i18n="chat.close">Details</button>
        <div id="authArea"></div>
      </div>
    </header>

    <div class="layout">
      <aside id="sidebar"></aside>
      <main>
        <div id="thread"></div>
      </main>
      <aside id="details">
        <div class="detailsHead">
          <div class="detailsTitle" id="dTitle">Trip</div>
          <div class="detailsMeta" id="dMeta"></div>
        </div>
        <div class="tabs">
          <button class="tab active" data-tab="itinerary" data-i18n="chat.itinerary">Itinerary</button>
          <button class="tab" data-tab="hotel" data-i18n="chat.hotel">Hotel</button>
          <button class="tab" data-tab="orders" data-i18n="chat.orders">Orders</button>
        </div>
        <div id="panel"></div>
      </aside>
      <footer>
        <form id="msgForm">
          <input id="msgInput" data-i18n="chat.type_message" placeholder="Type a message…" />
          <button id="sendBtn" type="submit" data-i18n="chat.send">Send</button>
        </form>
      </footer>
    </div>

    <script>if (location.hostname === "localhost" || location.hostname === "127.0.0.1") window.__API_BASE__ = "http://localhost:8000";</script>
    <script type="module" src="/i18n.js"></script>
    <script type="module" src="/app.js"></script>
    <script type="module" src="/chat.js"></script>
    <script type="module">
      import { initPWA, initVoiceInput, initCameraButton } from "/mobile-features.js";
      initPWA();
      // Voice/camera init after DOM ready — chat.js main() will call setup
      window._mobileInit = () => {
        initVoiceInput("msgInput", () => {
          document.getElementById("msgForm").dispatchEvent(new Event("submit", {cancelable:true}));
        });
        initCameraButton();
      };
    </script>
  </body>
</html>
