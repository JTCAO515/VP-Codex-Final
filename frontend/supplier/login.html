<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supplier Portal - China Travel Agent</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 32px; width: 100%; max-width: 400px; }
h1 { font-size: 20px; margin-bottom: 8px; color: #f0f0f0; }
p { color: #888; margin-bottom: 24px; font-size: 14px; }
label { display: block; margin-bottom: 6px; color: #aaa; font-size: 13px; }
input { width: 100%; padding: 10px 12px; background: #252525; border: 1px solid #444; border-radius: 8px; color: #e0e0e0; font-size: 14px; margin-bottom: 16px; }
input:focus { outline: none; border-color: #4a9eff; }
button { width: 100%; padding: 10px; background: #4a9eff; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
button:hover { background: #3a8eef; }
.error { color: #ff5555; font-size: 13px; margin-top: 8px; display: none; }
.back { display: block; text-align: center; margin-top: 12px; color: #666; font-size: 13px; text-decoration: none; }
.back:hover { color: #aaa; }
</style>
</head>
<body>
<div class="card">
  <h1>Supplier Portal</h1>
  <p>Enter your API key to access your dashboard.</p>
  <label>API Key</label>
  <input type="password" id="apikey" placeholder="sk-...">
  <button onclick="login()">Sign In</button>
  <div class="error" id="err"></div>
  <a class="back" href="/">← Back to home</a>
</div>
<script>
const API = window.location.origin + '/api';

async function login() {
  const key = document.getElementById('apikey').value.trim();
  if (!key) return;
  try {
    const r = await fetch(API + '/supplier/me', { headers: { 'X-API-Key': key } });
    if (!r.ok) throw new Error('Invalid API key');
    const d = await r.json();
    localStorage.setItem('supplier_apikey', key);
    localStorage.setItem('supplier_info', JSON.stringify(d.supplier));
    window.location.href = '/supplier/dashboard.html';
  } catch(e) {
    document.getElementById('err').style.display = 'block';
    document.getElementById('err').textContent = 'Invalid API key. Please try again.';
  }
}
</script>
</body>
</html>
