<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title data-i18n="auth.signing_in">Signing in…</title>
    <style>
      body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#05070b;color:rgba(255,255,255,.86);font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
      .box{max-width:520px;text-align:center}
      .muted{opacity:.65;font-size:12px;margin-top:8px}
    </style>
  </head>
  <body>
    <div class="box">
      <div style="font-size:16px;font-weight:650;" data-i18n="auth.signing_in">Signing in…</div>
      <div class="muted" data-i18n="auth.redirect">Redirecting in 3s…</div>
    </div>
    <script>if (location.hostname === "localhost" || location.hostname === "127.0.0.1") window.__API_BASE__ = "http://localhost:8000";</script>
    <script type="module">
      import { getSupabase } from "/app.js";
      import { initI18n } from "/i18n.js";
      initI18n();
      const sb = await getSupabase();
      if (sb) {
        await sb.auth.getSession();
      }
      setTimeout(() => (location.href = "/chat"), 300);
    </script>
  </body>
</html>
