<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>VisePanda AI — Your Journey Begins</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script>
// Load Google Identity Services on-demand (avoids blocking page load)
window._loadGoogleAuth = function(cb) {
  if (window.google) { cb(); return; }
  var s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  s.async = true;
  s.onload = cb;
  s.onerror = function(){ console.warn('Google Auth script failed to load'); };
  document.head.appendChild(s);
};
</script>
<style>
:root {
  --ink-deep: #080c14;
  --ink-dark: #0d1220;
  --ink-mid: #181f30;
  --gold: #c9a96e;
  --gold-light: #e0c78c;
  --gold-dim: #8b7355;
  --jade: #6b8e7b;
  --jade-light: #8fbfa7;
  --mist: rgba(200, 192, 176, 0.08);
  --mist-strong: rgba(200, 192, 176, 0.18);
  --text-primary: #e8e0d5;
  --text-secondary: #a09888;
  --text-dim: #6a6258;
  --card-bg: rgba(18, 24, 42, 0.85);
  --card-border: rgba(201, 169, 110, 0.15);
  --input-bg: rgba(14, 20, 36, 0.9);
  --input-border: rgba(201, 169, 110, 0.25);
  --input-focus: rgba(201, 169, 110, 0.5);
  --danger: #b85450;
  --font-display: 'Cormorant Garamond', 'Noto Serif SC', Georgia, serif;
  --font-cn: 'Noto Serif SC', 'Cormorant Garamond', SimSun, serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  background: var(--ink-deep);
  color: var(--text-primary);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== BACKGROUND CANVAS ===== */
#bg-canvas {
  position: fixed; inset:0; z-index:0;
  pointer-events: none;
}

/* ===== MOUNTAINS SVG LAYER ===== */
.mountains-layer {
  position: fixed; bottom:0; left:0; right:0; height:55vh; z-index:1;
  pointer-events:none; opacity:0.12;
}
.mountains-layer svg { width:100%; height:100%; }

/* ===== MIST OVERLAY ===== */
.mist {
  position: fixed; bottom:0; left:0; right:0; height:40vh; z-index:2;
  pointer-events:none;
  background: linear-gradient(to top, rgba(200,192,176,0.06) 0%, rgba(200,192,176,0.03) 40%, transparent 100%);
}
.mist::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse at 30% 80%, rgba(200,192,176,0.08) 0%, transparent 60%);
  animation: mistShift 12s ease-in-out infinite alternate;
}
.mist::after {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse at 70% 90%, rgba(200,192,176,0.06) 0%, transparent 50%);
  animation: mistShift 16s ease-in-out 4s infinite alternate;
}
@keyframes mistShift {
  0% { transform:translateX(-3%) scale(1.02); opacity:0.7; }
  100% { transform:translateX(3%) scale(0.98); opacity:1; }
}

/* ===== MAIN APP SHELL ===== */
.app-shell {
  position:relative; z-index:10;
  height:100vh; display:flex; flex-direction:column;
}

/* ===== HEADER ===== */
.app-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 28px; flex-shrink:0;
}
.brand {
  font-family: var(--font-display);
  font-size:22px; font-weight:500; letter-spacing:1.5px;
  color: var(--gold-light);
  cursor:pointer; transition:color 0.3s;
}
.brand:hover { color:var(--gold); }
.brand-sub {
  font-family: var(--font-cn);
  font-size: 13px; color: var(--text-dim);
  margin-left: 6px; font-weight: 300;
}
.header-right { display:flex; align-items:center; gap:12px; }
.btn-header {
  background: transparent; border: 1px solid var(--text-dim);
  color: var(--text-secondary); font-size:13px;
  padding: 7px 16px; border-radius: 20px; cursor:pointer;
  transition: all 0.3s; font-family: var(--font-body);
}
.btn-header:hover { border-color: var(--gold); color: var(--gold-light); }

.user-avatar {
  width:34px; height:34px; border-radius:50%; border:1.5px solid var(--gold-dim);
  cursor:pointer; object-fit:cover; background: var(--ink-mid);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; color: var(--gold-light);
  transition: border-color 0.3s;
}
.user-avatar:hover { border-color:var(--gold); }

/* ===== HERO SECTION ===== */
.hero-section {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:0 24px 5vh;
  transition: all 0.6s cubic-bezier(0.16,1,0.3,1);
}
.hero-section.chat-active {
  flex:1; justify-content:flex-start; padding-top:2vh;
  align-items:stretch; max-width:860px; margin:0 auto; width:100%;
}

/* ===== GREETING ===== */
.greeting {
  text-align:center; margin-bottom:36px; transition: all 0.6s;
}
.greeting h1 {
  font-family: var(--font-display);
  font-size:clamp(28px,5vw,48px); font-weight:500;
  color:var(--text-primary); letter-spacing:1px; line-height:1.3;
}
.greeting p {
  font-family: var(--font-cn);
  color:var(--text-secondary); font-size:15px; margin-top:8px;
  letter-spacing:2px; font-weight:300;
}
.chat-active .greeting { display:none; }

/* ===== DIALOG INPUT ===== */
.dialog-wrap {
  width:100%; max-width:640px; position:relative;
  transition: all 0.6s cubic-bezier(0.16,1,0.3,1);
}
.chat-active .dialog-wrap {
  max-width:100%; position:sticky; bottom:0; padding:12px 0;
  background: linear-gradient(to top, var(--ink-deep) 60%, transparent);
}

.dialog-box {
  display:flex; align-items:flex-end; gap:10px;
  background: var(--input-bg);
  border:1px solid var(--input-border);
  border-radius: 20px; padding:6px 8px 6px 20px;
  transition: all 0.35s;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.dialog-box:focus-within {
  border-color:var(--input-focus);
  box-shadow: 0 0 0 3px rgba(201,169,110,0.08), 0 8px 32px rgba(0,0,0,0.4);
}

.dialog-box textarea {
  flex:1; background:transparent; border:none; outline:none;
  color:var(--text-primary); font-size:16px; line-height:1.5;
  resize:none; max-height:160px; padding:8px 0;
  font-family: var(--font-body);
}
.dialog-box textarea::placeholder { color:var(--text-dim); }
.dialog-box textarea::-webkit-scrollbar { width:4px; }
.dialog-box textarea::-webkit-scrollbar-thumb { background:var(--ink-mid); border-radius:4px; }

.btn-send {
  width:42px; height:42px; border-radius:50%; border:none;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color:var(--ink-deep); cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition: all 0.3s; font-size:18px;
}
.btn-send:hover:not(:disabled) {
  transform:scale(1.05);
  box-shadow: 0 4px 20px rgba(201,169,110,0.3);
}
.btn-send:disabled { opacity:0.4; cursor:not-allowed; }

.hint-text {
  text-align:center; color:var(--text-dim); font-size:12px;
  margin-top:12px; letter-spacing:0.5px;
}
.chat-active .hint-text { display:none; }

/* ===== CHAT MESSAGES ===== */
.chat-messages {
  display:none; flex:1; overflow-y:auto; padding:0 4px 12px;
  flex-direction:column; gap:16px;
  scroll-behavior:smooth;
}
.chat-messages::-webkit-scrollbar { width:4px; }
.chat-messages::-webkit-scrollbar-thumb { background:var(--ink-mid); border-radius:4px; }
.chat-active .chat-messages { display:flex; }

.msg { display:flex; gap:10px; animation: msgIn 0.4s ease-out; }
@keyframes msgIn { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:none;} }
.msg.user { justify-content:flex-end; }
.msg.bot { justify-content:flex-start; }

.msg .avatar {
  width:32px; height:32px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:13px;
}
.msg.bot .avatar { background:rgba(107,142,123,0.2); color:var(--jade-light); }
.msg.user .avatar { background:rgba(201,169,110,0.15); color:var(--gold-light); }

.msg .bubble {
  max-width:78%; padding:10px 16px; border-radius:16px;
  font-size:14.5px; line-height:1.55; white-space:pre-wrap; word-break:break-word;
}
.msg.user .bubble { background:rgba(24,31,48,0.9); border:1px solid rgba(201,169,110,0.18); border-bottom-right-radius:6px; }
.msg.bot .bubble { background:rgba(14,20,36,0.9); border:1px solid rgba(107,142,123,0.2); border-bottom-left-radius:6px; }

.msg-actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
.msg-actions .chip {
  padding:8px 16px; border-radius:20px; border:1px solid rgba(201,169,110,0.25);
  background: rgba(201,169,110,0.06); color:var(--text-primary);
  font-size:13px; cursor:pointer; transition:all 0.25s;
}
.msg-actions .chip:hover {
  background:rgba(201,169,110,0.15); border-color:var(--gold);
  transform:translateY(-1px);
}

.itinerary-preview {
  margin-top:8px; padding:10px 14px; border-radius:12px;
  border:1px dashed var(--card-border); background:var(--card-bg);
  font-size:13px; color:var(--text-secondary);
  cursor:pointer; transition:border-color 0.25s;
}
.itinerary-preview:hover { border-color:var(--gold-dim); }

/* ===== MODAL ===== */
.modal-overlay {
  position:fixed; inset:0; z-index:100;
  background:rgba(8,12,20,0.85);
  backdrop-filter: blur(8px); -webkit-backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  animation: fadeIn 0.3s ease-out;
}
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

.modal-card {
  background: var(--card-bg); border:1px solid var(--card-border);
  border-radius: 20px; padding:36px 32px; width:90%; max-width:400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: modalIn 0.4s cubic-bezier(0.16,1,0.3,1);
}
@keyframes modalIn { from{opacity:0;transform:translateY(24px) scale(0.96);} to{opacity:1;transform:none;} }

.modal-card h2 {
  font-family: var(--font-display);
  font-size:26px; color:var(--text-primary); text-align:center;
  margin-bottom:6px; font-weight:500;
}
.modal-card .modal-subtitle {
  text-align:center; color:var(--text-dim); font-size:13px; margin-bottom:24px;
}

.form-group { margin-bottom:16px; }
.form-group label {
  display:block; font-size:12px; color:var(--text-secondary);
  margin-bottom:6px; letter-spacing:0.5px; text-transform:uppercase;
}
.form-group input {
  width:100%; padding:11px 14px; border-radius:12px;
  background:var(--input-bg); border:1px solid var(--input-border);
  color:var(--text-primary); font-size:15px; outline:none;
  transition: border-color 0.3s;
}
.form-group input:focus { border-color:var(--input-focus); }

.btn-primary {
  width:100%; padding:12px; border-radius:12px; border:none;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color:var(--ink-deep); font-size:15px; font-weight:600; cursor:pointer;
  transition: all 0.3s; margin-top:8px;
}
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(201,169,110,0.25); }
.btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }

.modal-divider {
  display:flex; align-items:center; gap:12px; margin:20px 0;
  color:var(--text-dim); font-size:12px;
}
.modal-divider::before, .modal-divider::after {
  content:''; flex:1; height:1px; background:var(--card-border);
}

.btn-google {
  width:100%; padding:11px; border-radius:12px;
  border:1px solid rgba(255,255,255,0.2); background:white;
  color:#1a1a1a; font-size:14px; font-weight:500; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:10px;
  transition:all 0.3s;
}
.btn-google:hover { background:#f5f5f5; transform:translateY(-1px); }
.btn-google svg { width:18px; height:18px; }

.modal-switch {
  text-align:center; margin-top:16px; font-size:13px; color:var(--text-secondary);
}
.modal-switch a { color:var(--gold-light); cursor:pointer; text-decoration:none; }
.modal-switch a:hover { text-decoration:underline; }

.modal-close {
  position:absolute; top:16px; right:20px;
  background:none; border:none; color:var(--text-dim);
  font-size:22px; cursor:pointer; transition:color 0.3s;
}
.modal-close:hover { color:var(--text-primary); }

.modal-card { position:relative; }

.error-msg {
  color:var(--danger); font-size:12px; margin-top:4px; display:none;
}
.error-msg.show { display:block; }

/* ===== LOADING SPINNER ===== */
.spinner {
  width:20px; height:20px; border:2px solid var(--card-border);
  border-top-color:var(--gold); border-radius:50%;
  animation:spin 0.7s linear infinite; display:inline-block; margin-right:6px;
}
@keyframes spin { to{transform:rotate(360deg);} }

/* ===== RESPONSIVE ===== */
@media (max-width:600px) {
  .app-header { padding:14px 16px; }
  .brand { font-size:18px; }
  .dialog-box { border-radius:16px; padding:4px 6px 4px 14px; }
  .dialog-box textarea { font-size:15px; }
  .modal-card { padding:28px 22px; }
  .greeting h1 { font-size:24px; }
}
</style>
</head>
<body>

<!-- Background Canvas for animated particles -->
<canvas id="bg-canvas"></canvas>

<!-- Mountains SVG Layer -->
<div class="mountains-layer">
<svg viewBox="0 0 1440 600" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Far mountains -->
  <path d="M0,500 Q80,380 180,420 Q280,340 400,380 Q520,300 640,350 Q760,280 880,340 Q1000,310 1120,360 Q1240,330 1340,370 Q1400,390 1440,410 L1440,600 L0,600Z" fill="url(#g2)"/>
  <!-- Mid mountains -->
  <path d="M0,520 Q120,420 240,460 Q360,380 480,430 Q600,360 720,410 Q840,370 960,420 Q1080,390 1200,430 Q1320,410 1440,440 L1440,600 L0,600Z" fill="url(#g2)"/>
  <!-- Near mountains -->
  <path d="M0,560 Q100,480 220,510 Q340,460 460,500 Q580,440 700,490 Q820,450 940,500 Q1060,470 1180,510 Q1300,490 1440,520 L1440,600 L0,600Z" fill="url(#g1)"/>
  <!-- Pagoda silhouette -->
  <g transform="translate(1150, 410)" opacity="0.07">
    <rect x="18" y="0" width="24" height="8" fill="#c9a96e"/>
    <rect x="14" y="8" width="32" height="6" fill="#c9a96e"/>
    <rect x="14" y="14" width="5" height="30" fill="#c9a96e"/>
    <rect x="41" y="14" width="5" height="30" fill="#c9a96e"/>
    <rect x="10" y="44" width="40" height="6" fill="#c9a96e"/>
    <rect x="10" y="50" width="5" height="60" fill="#c9a96e"/>
    <rect x="45" y="50" width="5" height="60" fill="#c9a96e"/>
    <rect x="8" y="8" width="4" height="10" fill="#c9a96e" transform="rotate(-20,10,10)"/>
    <rect x="48" y="8" width="4" height="10" fill="#c9a96e" transform="rotate(20,50,10)"/>
  </g>
  <!-- Crane 1 -->
  <g transform="translate(280, 300)" opacity="0.06">
    <path d="M0,0 Q15,-20 40,-8 Q20,-5 0,0Z" fill="#e8e0d5"/>
    <path d="M0,0 Q-10,-15 -30,-10 Q-15,-4 0,0Z" fill="#e8e0d5"/>
  </g>
  <!-- Crane 2 -->
  <g transform="translate(900, 280)" opacity="0.05">
    <path d="M0,0 Q12,-16 35,-6 Q18,-3 0,0Z" fill="#e8e0d5"/>
    <path d="M0,0 Q-8,-12 -25,-8 Q-12,-3 0,0Z" fill="#e8e0d5"/>
  </g>
</svg>
</div>

<!-- Mist -->
<div class="mist"></div>

<!-- Main App -->
<div class="app-shell" id="appShell">
  <header class="app-header">
    <div class="brand" onclick="location.reload()">
      VisePanda<span class="brand-sub">AI</span>
    </div>
    <div class="header-right" id="headerRight">
      <button class="btn-header" id="btnLogin" onclick="showAuthModal('login')">Sign In</button>
    </div>
  </header>

  <div class="hero-section" id="heroSection">
    <div class="greeting">
      <h1 id="greetingTitle">Where would you like to go?</h1>
      <p id="greetingSub">山川湖海，皆是归途</p>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="dialog-wrap" id="dialogWrap">
      <div class="dialog-box">
        <textarea id="chatInput" rows="1" placeholder="Tell me about your dream trip to China..." onkeydown="handleKeydown(event)"></textarea>
        <button class="btn-send" id="btnSend" onclick="sendMessage()" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
      <div class="hint-text">Your personal AI travel concierge for China · 多语种 · 行程规划 · 酒店预订 · 服务定制</div>
    </div>
  </div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal" style="display:none;">
  <div class="modal-card">
    <button class="modal-close" onclick="closeAuthModal()">&times;</button>
    <h2 id="modalTitle">Welcome Back</h2>
    <p class="modal-subtitle" id="modalSubtitle">Sign in to start planning your journey</p>

    <div id="registerFields" style="display:none;">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="regName" placeholder="Your name"/>
      </div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="········" onkeydown="if(event.key==='Enter')submitAuth()"/>
    </div>
    <div class="error-msg" id="authError"></div>
    <button class="btn-primary" id="btnAuthSubmit" onclick="submitAuth()">
      <span id="btnAuthText">Sign In</span>
    </button>

    <div class="modal-divider">or continue with</div>

    <button class="btn-google" onclick="triggerGoogleLogin()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <!-- Hidden Google button for programmatic triggering -->
    <div id="g_id_signin" style="display:none;"></div>

    <div class="modal-switch">
      <span id="switchText">Don't have an account? </span><a id="switchLink" onclick="toggleAuthMode()">Create one</a>
    </div>
  </div>
</div>

<script>
// ============ STATE ============
const STATE = {
  token: localStorage.getItem('cta_token'),
  user: JSON.parse(localStorage.getItem('cta_user') || 'null'),
  tripId: null,
  authMode: 'login', // 'login' | 'register'
  isChatActive: false,
};

const GOOGLE_CLIENT_ID = '717391693553-v6bta9jvdnur6iip9ptgvaop92p24luu.apps.googleusercontent.com';

// ============ GREETING ============
(function setGreeting() {
  const h = new Date().getHours();
  const titleEl = document.getElementById('greetingTitle');
  const subEl = document.getElementById('greetingSub');
  if (h < 6) {
    titleEl.textContent = '夜深了，想去哪里？';
    subEl.textContent = '星空之下，旅途正在酝酿';
  } else if (h < 12) {
    titleEl.textContent = 'Good morning, explorer';
    subEl.textContent = '一日之计，始于远方';
  } else if (h < 18) {
    titleEl.textContent = 'Where would you like to go?';
    subEl.textContent = '山川湖海，皆是归途';
  } else {
    titleEl.textContent = 'Good evening, traveler';
    subEl.textContent = '月上柳梢，正是规划时';
  }
})();

// ============ BACKEND URL ============
function getBaseUrl() {
  const stored = localStorage.getItem('cta_baseUrl');
  return stored || window.location.origin;
}

// ============ AUTH ============
function isLoggedIn() { return !!STATE.token && !!STATE.user; }

function updateUIForAuth() {
  const hr = document.getElementById('headerRight');
  const btnLogin = document.getElementById('btnLogin');
  if (isLoggedIn()) {
    hr.innerHTML = `
      <span style="font-size:13px;color:var(--text-secondary);">${escapeHtml(STATE.user.display_name || STATE.user.email)}</span>
      <div class="user-avatar" title="Sign out" onclick="logout()">
        ${STATE.user.avatar_url ? `<img src="${escapeHtml(STATE.user.avatar_url)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" alt="avatar"/>` : (STATE.user.display_name || 'U')[0].toUpperCase()}
      </div>`;
  } else {
    hr.innerHTML = '<button class="btn-header" id="btnLogin" onclick="showAuthModal(\'login\')">Sign In</button>';
  }
}

function logout() {
  STATE.token = null;
  STATE.user = null;
  STATE.tripId = null;
  STATE.isChatActive = false;
  localStorage.removeItem('cta_token');
  localStorage.removeItem('cta_user');
  localStorage.removeItem('cta_tripId');
  updateUIForAuth();
  resetChat();
}

function showAuthModal(mode) {
  STATE.authMode = mode;
  document.getElementById('authModal').style.display = 'flex';
  document.getElementById('authError').classList.remove('show');
  document.getElementById('authEmail').value = '';
  document.getElementById('authPassword').value = '';
  document.getElementById('regName').value = '';
  if (mode === 'register') {
    document.getElementById('modalTitle').textContent = 'Create Account';
    document.getElementById('modalSubtitle').textContent = 'Start your journey with us';
    document.getElementById('registerFields').style.display = 'block';
    document.getElementById('btnAuthText').textContent = 'Create Account';
    document.getElementById('switchText').textContent = 'Already have an account? ';
    document.getElementById('switchLink').textContent = 'Sign in';
  } else {
    document.getElementById('modalTitle').textContent = 'Welcome Back';
    document.getElementById('modalSubtitle').textContent = 'Sign in to start planning your journey';
    document.getElementById('registerFields').style.display = 'none';
    document.getElementById('btnAuthText').textContent = 'Sign In';
    document.getElementById('switchText').textContent = "Don't have an account? ";
    document.getElementById('switchLink').textContent = 'Create one';
  }
}

function closeAuthModal() {
  document.getElementById('authModal').style.display = 'none';
}

function toggleAuthMode() {
  showAuthModal(STATE.authMode === 'login' ? 'register' : 'login');
}

function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.classList.add('show');
}

async function submitAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const btn = document.getElementById('btnAuthSubmit');
  const errorEl = document.getElementById('authError');
  errorEl.classList.remove('show');

  if (!email || !password) { showAuthError('Please fill in all fields'); return; }

  btn.disabled = true;
  document.getElementById('btnAuthText').innerHTML = '<span class="spinner"></span> Please wait...';

  const endpoint = STATE.authMode === 'register' ? '/api/auth/register' : '/api/auth/login';
  const body = { email, password };
  if (STATE.authMode === 'register') {
    body.display_name = document.getElementById('regName').value.trim() || undefined;
  }

  try {
    const r = await fetch(`${getBaseUrl()}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await r.json();
    if (!r.ok) {
      showAuthError(data.detail || 'Authentication failed');
      btn.disabled = false;
      document.getElementById('btnAuthText').textContent = STATE.authMode === 'register' ? 'Create Account' : 'Sign In';
      return;
    }
    // Success
    STATE.token = data.access_token;
    STATE.user = data.user;
    localStorage.setItem('cta_token', STATE.token);
    localStorage.setItem('cta_user', JSON.stringify(STATE.user));
    closeAuthModal();
    updateUIForAuth();
  } catch (e) {
    showAuthError('Network error. Please try again.');
  }
  btn.disabled = false;
  document.getElementById('btnAuthText').textContent = STATE.authMode === 'register' ? 'Create Account' : 'Sign In';
}

// ============ GOOGLE LOGIN ============
function triggerGoogleLogin() {
  if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID === '{{GOOGLE_CLIENT_ID}}') {
    showAuthError('Google Sign-In is not configured yet. Please set GOOGLE_CLIENT_ID.');
    return;
  }
  // Dynamically load Google script before using it
  window._loadGoogleAuth(function() {
    try {
      const client = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'email profile openid',
    callback: async (response) => {
      if (response.error) {
        showAuthError('Google sign-in was cancelled or failed.');
        return;
      }
      // Send the access token to our backend
      // Actually, for ID token, we should use the credential from One Tap
      // Let's use the authorization code flow instead
      const btn = document.getElementById('btnAuthSubmit');
      btn.disabled = true;
      document.getElementById('btnAuthText').innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        const r = await fetch(`${getBaseUrl()}/api/auth/google`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id_token: response.access_token }),
        });
        const data = await r.json();
        if (!r.ok) {
          showAuthError(data.detail || 'Google authentication failed');
          btn.disabled = false;
          document.getElementById('btnAuthText').textContent = 'Sign In';
          return;
        }
        STATE.token = data.access_token;
        STATE.user = data.user;
        localStorage.setItem('cta_token', STATE.token);
        localStorage.setItem('cta_user', JSON.stringify(STATE.user));
        closeAuthModal();
        updateUIForAuth();
      } catch (e) {
        showAuthError('Network error. Please try again.');
      }
      btn.disabled = false;
      document.getElementById('btnAuthText').textContent = 'Sign In';
    },
  });
  client.requestAccessToken();
    } catch(e) {
      showAuthError('Google Sign-In failed to load. Please try again later.');
    }
  });
}

// ============ CHAT ============
function resetChat() {
  document.getElementById('heroSection').classList.remove('chat-active');
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('chatInput').value = '';
  document.getElementById('btnSend').disabled = true;
}

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

const inputEl = document.getElementById('chatInput');
inputEl.addEventListener('input', () => {
  document.getElementById('btnSend').disabled = !inputEl.value.trim();
  // Auto-resize
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});

async function sendMessage(text) {
  if (!text) text = inputEl.value.trim();
  if (!text) return;

  // Check auth
  if (!isLoggedIn()) {
    showAuthModal('login');
    return;
  }

  // Activate chat view
  if (!STATE.isChatActive) {
    STATE.isChatActive = true;
    document.getElementById('heroSection').classList.add('chat-active');
  }

  // Generate tripId if needed
  if (!STATE.tripId) {
    STATE.tripId = 't_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    localStorage.setItem('cta_tripId', STATE.tripId);
  }

  addMessage('user', text);
  inputEl.value = '';
  inputEl.style.height = 'auto';
  document.getElementById('btnSend').disabled = true;

  // Show typing indicator
  const typingId = addTypingIndicator();

  try {
    const endpoint = STATE.token ? '/api/chat/messages/secure' : '/api/chat/messages';
    const body = STATE.token
      ? { trip_id: STATE.tripId, text }
      : { user_id: STATE.user?.id || 'u_anon', trip_id: STATE.tripId, text };
    const headers = { 'Content-Type': 'application/json' };
    if (STATE.token) headers['Authorization'] = `Bearer ${STATE.token}`;

    const r = await fetch(`${getBaseUrl()}${endpoint}`, {
      method: 'POST',
      headers,
      body: JSON.stringify(body),
    });
    const data = await r.json();

    removeTypingIndicator(typingId);

    if (data.reply) {
      addMessage('bot', data.reply, data.actions || []);
    }
  } catch (e) {
    removeTypingIndicator(typingId);
    addMessage('bot', 'Sorry, something went wrong. Please try again.');
  }
}

function addMessage(role, text, actions) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (role === 'bot') {
    div.innerHTML = `<div class="avatar">AI</div><div><div class="bubble">${escapeHtml(text)}</div><div class="msg-actions" id="actions-${Date.now()}"></div></div>`;
  } else {
    div.innerHTML = `<div><div class="bubble">${escapeHtml(text)}</div></div><div class="avatar">${(STATE.user?.display_name || 'U')[0].toUpperCase()}</div>`;
  }

  container.appendChild(div);

  if (actions && actions.length) {
    const actionContainer = div.querySelector('.msg-actions');
    actions.forEach(a => {
      if (a.type === 'ask' && Array.isArray(a.options)) {
        a.options.forEach(opt => {
          const chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = opt;
          chip.onclick = () => sendMessage(opt);
          actionContainer.appendChild(chip);
        });
      }
      if (a.type === 'itinerary_updated' && a.itinerary) {
        const preview = document.createElement('div');
        preview.className = 'itinerary-preview';
        preview.innerHTML = `&#128205; Itinerary ready — <b>${a.itinerary.version}</b> · ${a.itinerary.days?.length || '?'} days`;
        preview.onclick = () => {
          addMessage('bot', JSON.stringify(a.itinerary, null, 2));
        };
        actionContainer.appendChild(preview);
      }
      if (a.type === 'suggest_refine' && a.suggestion) {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.style.borderStyle = 'dashed';
        chip.textContent = '✏️ ' + (a.suggestion.question || 'Refine');
        chip.onclick = () => {
          if (a.suggestion.options && a.suggestion.options.length) {
            a.suggestion.options.forEach(opt => {
              const c = document.createElement('span');
              c.className = 'chip';
              c.textContent = opt;
              c.onclick = () => sendMessage(opt);
              actionContainer.appendChild(c);
            });
          }
        };
        actionContainer.appendChild(chip);
      }
    });
  }

  container.scrollTop = container.scrollHeight;
  return div;
}

function addTypingIndicator() {
  const container = document.getElementById('chatMessages');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = id;
  div.innerHTML = `<div class="avatar">AI</div><div class="bubble" style="display:flex;gap:4px;align-items:center;padding:14px 18px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--text-dim);animation:dotBounce 1.4s infinite"></span><span style="width:6px;height:6px;border-radius:50%;background:var(--text-dim);animation:dotBounce 1.4s 0.2s infinite"></span><span style="width:6px;height:6px;border-radius:50%;background:var(--text-dim);animation:dotBounce 1.4s 0.4s infinite"></span></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return id;
}

function removeTypingIndicator(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============ PARTICLES BACKGROUND ============
(function initParticles() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const MAX = 50;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function createParticle() {
    return {
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.5,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3 - 0.15,
      opacity: Math.random() * 0.5 + 0.1,
      pulse: Math.random() * Math.PI * 2,
    };
  }

  for (let i = 0; i < MAX; i++) particles.push(createParticle());

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.pulse += 0.01;

      if (p.x < -20) p.x = canvas.width + 20;
      if (p.x > canvas.width + 20) p.x = -20;
      if (p.y < -20) p.y = canvas.height + 20;
      if (p.y > canvas.height + 20) p.y = -20;

      const alpha = p.opacity * (0.6 + 0.4 * Math.sin(p.pulse));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201,169,110,${alpha})`;
      ctx.fill();
    }

    // Draw connection lines for nearby particles
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(201,169,110,${0.03 * (1 - dist / 120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(animate);
  }
  animate();
})();

// Add the dotBounce animation dynamically
const dotStyle = document.createElement('style');
dotStyle.textContent = `@keyframes dotBounce{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-8px);opacity:1;}}`;
document.head.appendChild(dotStyle);

// ============ INIT ============

// Restore tripId from localStorage

if (savedTripId) STATE.tripId = savedTripId;

// Close modal on overlay click
document.getElementById('authModal').addEventListener('click', function(e) {
  if (e.target === this) closeAuthModal();
});

const urlParams = new URLSearchParams(window.location.search);
const gcid = urlParams.get('google_client_id');
if (gcid) {
  // Override for development
  window._GOOGLE_CLIENT_ID = gcid;
}

console.log('🐼 VisePanda AI ready. Login to start your journey.');
</script>
