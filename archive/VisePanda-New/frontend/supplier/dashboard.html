<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Supplier Portal</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
header { background: #1a1a1a; border-bottom: 1px solid #333; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
header h1 { font-size: 18px; color: #f0f0f0; }
header .user { font-size: 13px; color: #888; }
header button { padding: 6px 14px; background: #333; color: #ccc; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
.container { max-width: 960px; margin: 0 auto; padding: 24px; }
.tabs { display: flex; gap: 4px; margin-bottom: 24px; }
.tab { padding: 8px 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px 8px 0 0; color: #888; cursor: pointer; font-size: 14px; }
.tab.active { background: #252525; color: #4a9eff; border-bottom-color: #252525; }
.panel { display: none; }
.panel.active { display: block; }
.card { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: border-color .2s; }
.card:hover { border-color: #4a9eff; }
.card h3 { font-size: 15px; margin-bottom: 6px; color: #f0f0f0; }
.card .meta { font-size: 12px; color: #666; }
.status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.status.open { background: #1a3a1a; color: #4caf50; }
.status.closed { background: #3a1a1a; color: #f44336; }
.status.in_progress, .status.accepted_by_supplier { background: #1a2a3a; color: #4a9eff; }
.status.completed { background: #1a3a2a; color: #66bb6a; }
.empty { text-align: center; padding: 48px; color: #555; font-size: 14px; }
.loading { text-align: center; padding: 24px; color: #666; }
</style>
</head>
<body>
<header>
  <h1>Supplier Dashboard</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="user" id="supplierName">Loading...</span>
    <button onclick="logout()">Logout</button>
  </div>
</header>
<div class="container">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('rfps')">RFPs</div>
    <div class="tab" onclick="switchTab('orders')">Orders</div>
  </div>
  <div class="panel active" id="panel-rfps"><div class="loading">Loading RFPs...</div></div>
  <div class="panel" id="panel-orders"><div class="loading">Loading orders...</div></div>
</div>
<script>
const API = window.location.origin + '/api';
const KEY = localStorage.getItem('supplier_apikey');
if (!KEY) { window.location.href = '/supplier/login.html'; }

const H = () => ({ 'X-API-Key': KEY });

async function init() {
  try {
    const r = await fetch(API + '/supplier/me', { headers: H() });
    const d = await r.json();
    document.getElementById('supplierName').textContent = d.supplier.name;
  } catch(e) { logout(); }
  loadRfps();
}

async function loadRfps() {
  try {
    const r = await fetch(API + '/supplier/rfps', { headers: H() });
    const d = await r.json();
    const el = document.getElementById('panel-rfps');
    if (!d.rfps.length) { el.innerHTML = '<div class="empty">No RFPs yet. Check back later.</div>'; return; }
    el.innerHTML = d.rfps.map(r => `
      <div class="card" onclick="location.href='/supplier/rfp.html?id=${r.id}'">
        <h3>${r.service_types.join(', ') || 'Custom Service'}</h3>
        <div class="meta">ID: ${r.id.slice(0,8)}... | <span class="status ${r.status}">${r.status}</span></div>
      </div>
    `).join('');
  } catch(e) { document.getElementById('panel-rfps').innerHTML = '<div class="empty">Failed to load.</div>'; }
}

async function loadOrders() {
  try {
    const r = await fetch(API + '/supplier/orders', { headers: H() });
    const d = await r.json();
    const el = document.getElementById('panel-orders');
    if (!d.orders.length) { el.innerHTML = '<div class="empty">No orders yet.</div>'; return; }
    el.innerHTML = d.orders.map(o => `
      <div class="card">
        <h3>Order #${o.id.slice(0,8)}</h3>
        <div class="meta">RFP: ${o.rfp_id.slice(0,8)}... | <span class="status ${o.status}">${o.status}</span></div>
      </div>
    `).join('');
  } catch(e) { document.getElementById('panel-orders').innerHTML = '<div class="empty">Failed to load.</div>'; }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'orders') loadOrders();
}

function logout() {
  localStorage.removeItem('supplier_apikey');
  localStorage.removeItem('supplier_info');
  window.location.href = '/supplier/login.html';
}

init();
</script>
</body>
</html>
