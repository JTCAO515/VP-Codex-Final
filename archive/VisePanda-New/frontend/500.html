<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>500 — Server Error</title>
  <style>
    :root {
      --bg0: #05070b;
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --accent: #fca5a5;
      font-family: ui-sans-serif,system-ui,-apple-system,sans-serif;
    }
    body {
      margin:0;
      min-height:100vh;
      background: radial-gradient(1200px 800px at 30% 15%, #261212 0%, #170f0f 55%, #0b0505 100%);
      color: var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }
    h1 { font-size: 120px; margin: 0; color: var(--accent); opacity: .6; }
    p { color: var(--muted); margin: 12px 0 24px; }
    a {
      color: var(--accent);
      text-decoration: none;
      border: 1px solid rgba(252,165,165,.35);
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 14px;
    }
    a:hover { background: rgba(252,165,165,.12); }
  </style>
</head>
<body>
  <div>
    <h1>500</h1>
    <p>Something went wrong on our end. We've been notified and are working on it.</p>
    <a href="/">← Back to Home</a>
  </div>
</body>
</html>
