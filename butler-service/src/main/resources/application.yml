server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

butler:
  llm:
    api-key: ${BUTLER_LLM_API_KEY:}
    model: ${BUTLER_LLM_MODEL:}

spring:
  jackson:
    default-property-inclusion: non_null
